<!DOCTYPE html>
<html>
<head>
    <title>MOOC</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">MOOC</a>

    <div>
      <a class="btn btn-outline-light me-2" href="/">Courses</a>
      <a class="btn btn-outline-light me-2" href="/my-courses/">My Courses</a>

      {% if user.is_authenticated %}
      <a class="btn btn-danger" href="/accounts/logout/">Logout</a>
      {% else %}
      <a class="btn btn-success" href="/accounts/login/">Login</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
